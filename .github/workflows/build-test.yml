name: Build and Test

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.102'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}

      - name: Restore Bootstrapper
        run: dotnet restore ./src/Bootstrapper/Bootstrapper.csproj

      - name: Build Bootstrapper
        run: dotnet build --configuration Release --no-restore ./src/Bootstrapper/Bootstrapper.csproj

      - name: Check Format
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Run Unit Tests
        run: dotnet test --filter UnitTests

      - name: Run Architecture Tests
        run: dotnet test --filter ArchitectureTests